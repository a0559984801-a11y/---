<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .result-item {
            padding: 12px;
            margin-bottom: 10px;
            background: white;
            border-right: 4px solid #667eea;
            border-radius: 4px;
        }
        
        .result-item.busy {
            border-right-color: #e74c3c;
        }
        
        .result-item.free {
            border-right-color: #27ae60;
        }
        
        .result-date {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .result-status {
            font-size: 0.9em;
            color: #666;
        }
        
        .result-item.busy .result-status {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .result-item.free .result-status {
            color: #27ae60;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85em;
            color: #999;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💍 אולם בקליק</h1>
        <p class="subtitle">בדוק זמינות אולמות חתונה בקלות</p>
        
        <form id="searchForm">
            <div class="form-group">
                <label for="hallSelect">בחר אולם:</label>
                <select id="hallSelect" required>
                    <option value="">-- בחר אולם --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="dateInput">תאריך:</label>
                <input type="date" id="dateInput" required>
            </div>
            
            <button type="submit">בדוק זמינות</button>
        </form>
        
        <div class="loading" id="loading">
            <p>⏳ טוען...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <h3 style="margin-bottom: 15px;">תוצאות:</h3>
            <div id="resultsList"></div>
        </div>
        
        <div class="footer">
            <p>🔒 נתוני הזמינות מעודכנים יומית</p>
            <p><a href="privacy.html">מדיניות פרטיות</a></p>
        </div>
    </div>
    
    <script src="supabase.min.js"></script>
    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://mzrnwtwyuligsaxeoxhh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16cm53dHd1bGlnc2F4ZW94aGgiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxNzc0Mjk4NCwiZXhwIjoxODc1NTA4OTg0fQ.Gvq7_8XWmgZQ6qpLfxC8FsKL6-4gq0rXV1iSZANVjqU';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const hallSelect = document.getElementById('hallSelect');
        const dateInput = document.getElementById('dateInput');
        const searchForm = document.getElementById('searchForm');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const resultsList = document.getElementById('resultsList');
        
        // Set today's date as default
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        dateInput.valueAsDate = today;
        dateInput.min = today.toISOString().split('T')[0];
        
        // Load halls on page load
        (async () => {
            try {
                const { data: halls, error: err } = await supabase
                    .from('halls')
                    .select('id, name')
                    .order('name');
                
                if (err) throw err;
                
                halls.forEach(hall => {
                    const option = document.createElement('option');
                    option.value = hall.id;
                    option.textContent = hall.name;
                    hallSelect.appendChild(option);
                });
            } catch (e) {
                console.error('Error loading halls:', e);
                showError('שגיאה בטעינת רשימת האולמות');
            }
        })();
        
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const hallId = hallSelect.value;
            const date = dateInput.value;
            
            if (!hallId || !date) {
                showError('אנא בחר אולם ותאריך');
                return;
            }
            
            loading.classList.add('show');
            error.classList.remove('show');
            results.classList.remove('show');
            
            try {
                const { data: availability, error: err } = await supabase
                    .from('זמינות')
                    .select(`*`)
                    .eq('hall_id', hallId)
                    .eq('date', date);
                
                if (err) throw err;
                
                loading.classList.remove('show');
                
                if (availability && availability.length > 0) {
                    const record = availability[0];
                    const status = record.is_busy ? 'תפוס' : 'פנוי';
                    const statusClass = record.is_busy ? 'busy' : 'free';
                    
                    resultsList.innerHTML = `
                        <div class="result-item ${statusClass}">
                            <div class="result-date">${formatDate(date)}</div>
                            <div class="result-status">${status}</div>
                        </div>
                    `;
                    results.classList.add('show');
                } else {
                    showError('אין נתונים עבור תאריך זה');
                }
            } catch (e) {
                console.error('Error fetching availability:', e);
                loading.classList.remove('show');
                showError('שגיאה בקבלת נתוני הזמינות');
            }
        });
        
        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('he-IL', options);
        }
        
        function showError(msg) {
            error.textContent = msg;
            error.classList.add('show');
        }
    </script>
</body>
</html>
